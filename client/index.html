<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet" />
    <title>Zentra</title>
    <style>
      /* ── Splash screen ───────────────────────────────────────────────────────── */
      #spl {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #07090f;
        /* dot-grid texture */
        background-image: radial-gradient(circle, rgba(255,255,255,0.045) 1px, transparent 1px);
        background-size: 28px 28px;
        transition: opacity 0.55s cubic-bezier(0.4,0,0.2,1),
                    transform 0.55s cubic-bezier(0.4,0,0.2,1);
      }
      /* Radial hero glow behind the logo */
      #spl::before {
        content: '';
        position: absolute;
        width: 480px;
        height: 480px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(99,102,241,0.13) 0%, transparent 70%);
        pointer-events: none;
        animation: spl-halo 3s ease-in-out infinite alternate;
      }
      @keyframes spl-halo {
        from { transform: scale(0.9); opacity: 0.7; }
        to   { transform: scale(1.1); opacity: 1; }
      }
      #spl.spl-out {
        opacity: 0;
        transform: scale(1.04);
        pointer-events: none;
      }

      /* ── Inner stack ─────────────────────────────────────────────────────────── */
      .spl-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: relative;
        z-index: 1;
      }

      /* ── Logo ─────────────────────────────────────────────────────────────────
         No surrounding ring — just an entrance animation + soft glow pulse. */
      .spl-ring-wrap {
        position: relative;
        width: 108px;
        height: 108px;
        animation: spl-logo-in 0.75s cubic-bezier(0.34,1.5,0.64,1) both;
      }
      @keyframes spl-logo-in {
        from { opacity: 0; transform: scale(0.55) translateY(16px); filter: blur(12px); }
        to   { opacity: 1; transform: scale(1)    translateY(0);    filter: blur(0); }
      }
      .spl-logo {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: contain;
        border-radius: 50%;
        animation: spl-logo-glow 2.4s ease-in-out infinite;
      }
      @keyframes spl-logo-glow {
        0%, 100% { filter: drop-shadow(0 0 8px  rgba(99,102,241,0.4)); }
        50%      { filter: drop-shadow(0 0 18px rgba(168,85,247,0.7)); }
      }

      /* ── Brand name ──────────────────────────────────────────────────────────── */
      .spl-name {
        margin-top: 22px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 26px;
        font-weight: 700;
        letter-spacing: -0.4px;
        color: #fff;
        animation: spl-text-up 0.6s 0.25s cubic-bezier(0.34,1.3,0.64,1) both;
      }
      @keyframes spl-text-up {
        from { opacity: 0; transform: translateY(10px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── Tagline ─────────────────────────────────────────────────────────────── */
      .spl-tag {
        margin-top: 6px;
        font-family: 'Inter', system-ui, sans-serif;
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 2.5px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.3);
        animation: spl-text-up 0.6s 0.4s cubic-bezier(0.34,1.3,0.64,1) both;
      }

      /* ── Progress bar ─────────────────────────────────────────────────────────
         Indeterminate loader: a coloured segment sweeps across the track in a
         continuous loop until the React app dismisses the splash. */
      .spl-bar-wrap {
        position: relative;
        margin-top: 32px;
        width: 160px;
        height: 3px;
        border-radius: 2px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
        animation: spl-text-up 0.4s 0.55s ease both;
      }
      .spl-bar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100%;
        width: 40%;
        border-radius: 2px;
        background: linear-gradient(90deg,
          transparent 0%,
          #6366f1    30%,
          #a855f7    50%,
          #06b6d4    70%,
          transparent 100%);
        animation: spl-bar-sweep 1.4s 0.6s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      }
      @keyframes spl-bar-sweep {
        0%   { transform: translateX(-100%); }
        100% { transform: translateX(400%); }
      }

      /* Prevent flash of unstyled #root while JS loads */
      #root:empty { display: none; }
    </style>
  </head>
  <body>
    <script>
      (function() {
        var t = localStorage.getItem('helpdesk-theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
      })();
    </script>

    <!-- Splash — rendered immediately, before any JS bundle downloads -->
    <div id="spl" aria-hidden="true">
      <div class="spl-inner">
        <div class="spl-ring-wrap">
          <img src="/logo.png" alt="" class="spl-logo" />
        </div>
        <p class="spl-name">Zentra</p>
        <p class="spl-tag">IT Service Management</p>
        <div class="spl-bar-wrap">
          <div class="spl-bar"></div>
        </div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
